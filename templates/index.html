<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinyl ID</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            height: 100vh;
            overflow: hidden;
            transition: background 1s ease;
        }

        .background-gradient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background: linear-gradient(135deg, var(--bg-color-1, #1a1a2e) 0%, var(--bg-color-2, #16213e) 100%);
            transition: background 1.5s ease;
        }

        .background-blur {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-size: cover;
            background-position: center;
            filter: blur(100px) saturate(1.5);
            opacity: 0.4;
            z-index: -1;
            transition: background-image 1s ease;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(0,0,0,0.4);
            height: 32px;
        }

        .logo {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .nav-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: rgba(255,255,255,0.7);
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.2s;
        }

        .nav-btn:hover, .nav-btn.active {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }

        .nav-btn.active {
            border-color: #4ade80;
            color: #4ade80;
        }

        /* Views */
        .view {
            display: none;
            height: 100vh;
            padding-top: 32px;
        }

        .view.active {
            display: flex;
        }

        /* ===== NOW PLAYING VIEW ===== */
        #playingView {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 4px 36px;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .idle-state, .now-playing {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            height: 100%;
        }

        .album-art {
            width: min(calc(100vh - 220px), 94vw);
            height: min(calc(100vh - 220px), 94vw);
            background: linear-gradient(135deg, #333 0%, #222 100%);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 15px 50px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5vh;
            flex-shrink: 0;
        }

        .album-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .album-art .placeholder {
            font-size: clamp(4rem, 15vw, 8rem);
            opacity: 0.3;
        }

        .track-info {
            text-align: center;
            max-width: 100%;
            padding: 0 4px;
        }

        .track-title-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 2px;
        }

        .track-title {
            font-size: clamp(2rem, 7vw, 3.5rem);
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            max-width: 94vw;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .star-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            font-size: clamp(1.6rem, 5vw, 2.5rem);
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 50%;
            transition: all 0.2s;
            line-height: 1;
            color: rgba(255,255,255,0.5);
            flex-shrink: 0;
        }

        .star-btn.starred {
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.2);
            border-color: #fbbf24;
        }

        .track-artist {
            font-size: clamp(1.5rem, 5.5vw, 2.5rem);
            color: rgba(255,255,255,0.8);
            margin-bottom: 2px;
        }

        .track-details {
            display: flex;
            justify-content: center;
            gap: 16px;
            font-size: clamp(1.1rem, 4vw, 1.6rem);
            color: rgba(255,255,255,0.6);
        }

        .idle-state h2 {
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            font-weight: 400;
            color: rgba(255,255,255,0.5);
            margin-bottom: 12px;
        }

        .idle-state p {
            color: rgba(255,255,255,0.3);
            font-size: clamp(1rem, 3.5vw, 1.4rem);
        }

        /* Status bar */
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 6px 12px;
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 28px;
        }

        .status-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #666;
        }

        .status-dot.listening {
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        .status-dot.analyzing {
            background: #fbbf24;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.7);
        }

        .audio-visualizer {
            display: flex;
            gap: 2px;
            height: 16px;
            align-items: flex-end;
        }

        .audio-bar {
            width: 3px;
            background: linear-gradient(to top, #4ade80, #22d3ee);
            border-radius: 2px;
        }

        /* ===== HISTORY VIEW ===== */
        #historyView {
            flex-direction: column;
            padding: 40px 16px 36px;
            background: #121212;
        }

        /* Sub-tabs for history */
        .history-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .history-tab {
            padding: 8px 20px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            color: #888;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .history-tab.active {
            background: #2a2a2a;
            color: #fff;
            border-color: #444;
        }

        .history-panel {
            display: none;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        .history-panel.active {
            display: flex;
        }

        /* Stats row */
        .stats-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        .stat-box {
            flex: 1;
            background: #1a1a1a;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 600;
            color: #4ade80;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #666;
            text-transform: uppercase;
            margin-top: 4px;
        }

        /* Top lists side by side */
        .top-lists {
            display: flex;
            gap: 16px;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        .top-card {
            flex: 1;
            background: #1a1a1a;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .top-card h3 {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 12px;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .top-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .top-item {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #222;
            gap: 10px;
        }

        .top-item:last-child {
            border-bottom: none;
        }

        .top-rank {
            width: 20px;
            font-size: 0.9rem;
            color: #555;
            font-weight: 600;
            text-align: center;
        }

        .top-rank.gold { color: #fbbf24; }

        .top-cover {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            background: #333;
            object-fit: cover;
            flex-shrink: 0;
        }

        .top-info {
            flex: 1;
            min-width: 0;
        }

        .top-name {
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #ddd;
        }

        .top-sub {
            font-size: 0.75rem;
            color: #666;
            margin-top: 2px;
        }

        .top-count {
            font-size: 0.9rem;
            color: #4ade80;
            font-weight: 500;
        }

        /* Tracks panel */
        .history-filters {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .search-input {
            flex: 1;
            padding: 10px 14px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
        }

        .search-input::placeholder {
            color: #555;
        }

        .filter-btn {
            padding: 10px 16px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            color: #888;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .filter-btn.active {
            background: #2a3a2a;
            border-color: #4ade80;
            color: #4ade80;
        }

        .history-table-container {
            flex: 1;
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
        }

        .history-table thead {
            display: table;
            width: 100%;
            table-layout: fixed;
        }

        .history-table th {
            text-align: left;
            padding: 12px 14px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #666;
            text-transform: uppercase;
            background: #151515;
            border-bottom: 1px solid #2a2a2a;
        }

        .history-table-body {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .history-table tbody {
            display: table;
            width: 100%;
            table-layout: fixed;
        }

        .history-table td {
            padding: 12px 14px;
            border-bottom: 1px solid #222;
            font-size: 0.95rem;
            color: #ccc;
        }

        .history-table tr:hover {
            background: #1e1e1e;
        }

        .history-track-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .history-cover {
            width: 44px;
            height: 44px;
            border-radius: 4px;
            background: #333;
            object-fit: cover;
            flex-shrink: 0;
        }

        .history-track-info {
            min-width: 0;
            flex: 1;
        }

        .history-track-name {
            font-weight: 500;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-track-artist {
            font-size: 0.85rem;
            color: #888;
            margin-top: 2px;
        }

        .history-star {
            cursor: pointer;
            font-size: 1.2rem;
            color: #444;
        }

        .history-star.starred {
            color: #fbbf24;
        }

        .text-muted {
            color: #666;
        }

        .hidden {
            display: none !important;
        }

        /* Scrollbar */
        .history-table-body::-webkit-scrollbar,
        .top-list::-webkit-scrollbar,
        .genre-chart::-webkit-scrollbar {
            width: 6px;
        }

        .history-table-body::-webkit-scrollbar-track,
        .top-list::-webkit-scrollbar-track,
        .genre-chart::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .history-table-body::-webkit-scrollbar-thumb,
        .top-list::-webkit-scrollbar-thumb,
        .genre-chart::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        .history-table-body::-webkit-scrollbar-thumb:hover,
        .top-list::-webkit-scrollbar-thumb:hover,
        .genre-chart::-webkit-scrollbar-thumb:hover {
            background: #444;
        }

        .empty-msg {
            text-align: center;
            color: #555;
            padding: 30px;
            font-size: 1rem;
        }

        /* History/New badges */
        .history-badge, .new-badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: clamp(0.7rem, 2.5vw, 0.9rem);
            font-weight: 500;
        }

        .history-badge {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }

        .new-badge {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
        }

        /* Genre chart */
        .genre-chart-container {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 20px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .genre-chart-container h3 {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 16px;
            text-transform: uppercase;
        }

        .genre-chart {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .genre-bar-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .genre-name {
            width: 100px;
            font-size: 0.85rem;
            color: #ccc;
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-shrink: 0;
        }

        .genre-bar-wrapper {
            flex: 1;
            height: 24px;
            background: #222;
            border-radius: 4px;
            overflow: hidden;
        }

        .genre-bar {
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #22d3ee);
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .genre-count {
            width: 40px;
            font-size: 0.85rem;
            color: #4ade80;
            text-align: left;
        }

        /* Track number column */
        .track-num {
            color: #666;
            font-size: 0.8rem;
        }

        /* ===== IDLE SCREEN ===== */
        #idleView {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0a15 0%, #1a1a2e 50%, #0a0a15 100%);
            background-size: 400% 400%;
            animation: gradientShift 8s ease infinite;
            position: relative;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            25% { background-position: 100% 50%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 0% 100%; }
            100% { background-position: 0% 50%; }
        }

        .idle-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
        }

        .idle-day {
            font-size: clamp(1rem, 4vw, 1.5rem);
            font-weight: 300;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .idle-clock {
            font-size: clamp(4rem, 18vw, 8rem);
            font-weight: 200;
            letter-spacing: 0.05em;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.3);
            margin-bottom: 0.5rem;
        }

        .idle-weather {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: clamp(1.2rem, 5vw, 2rem);
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 1.5rem;
        }

        .idle-weather-icon {
            font-size: clamp(1.5rem, 6vw, 2.5rem);
        }

        .idle-weather-temp {
            font-weight: 300;
        }

        .idle-weather-condition {
            font-size: clamp(0.8rem, 3vw, 1.2rem);
            color: rgba(255, 255, 255, 0.4);
        }

        .idle-prompt {
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            color: rgba(255, 255, 255, 0.4);
            font-weight: 300;
            letter-spacing: 0.1em;
            margin-bottom: 2rem;
            animation: fadeInOut 4s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        .idle-top-artists {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
        }

        .idle-artist {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .idle-artist-rank {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .idle-artist-name {
            font-size: clamp(0.8rem, 3vw, 1.1rem);
            color: rgba(255, 255, 255, 0.6);
            font-weight: 400;
            max-width: 100px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .idle-particles {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .idle-particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, rgba(74, 222, 128, 0.4) 0%, transparent 70%);
            border-radius: 50%;
            animation: floatUp 12s infinite linear;
        }

        .idle-particle:nth-child(odd) {
            background: radial-gradient(circle, rgba(34, 211, 238, 0.4) 0%, transparent 70%);
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) translateX(0) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 1;
                transform: translateY(80vh) translateX(10px) scale(1);
            }
            50% {
                transform: translateY(40vh) translateX(-20px) scale(1.2);
            }
            90% {
                opacity: 1;
                transform: translateY(10vh) translateX(30px) scale(0.8);
            }
            100% {
                transform: translateY(-10vh) translateX(0) scale(0.5);
                opacity: 0;
            }
        }

        .idle-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(74, 222, 128, 0.15) 0%, transparent 70%);
            animation: pulseGlow 6s ease-in-out infinite;
            pointer-events: none;
        }

        .idle-glow:nth-child(2) {
            background: radial-gradient(circle, rgba(34, 211, 238, 0.1) 0%, transparent 70%);
            animation-delay: -3s;
            width: 400px;
            height: 400px;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="background-gradient"></div>
    <div class="background-blur" id="backgroundBlur"></div>

    <nav>
        <div class="logo">VINYL ID</div>
        <div class="nav-links">
            <button class="nav-btn" id="idleBtn">Idle</button>
            <button class="nav-btn active" id="playingBtn">Playing</button>
            <button class="nav-btn" id="historyBtn">History</button>
            <button class="nav-btn" id="fullscreenBtn">Fullscreen</button>
        </div>
    </nav>

    <!-- Idle Screen View -->
    <div class="view" id="idleView">
        <div class="idle-glow"></div>
        <div class="idle-glow"></div>
        <div class="idle-particles" id="idleParticles"></div>
        <div class="idle-content">
            <div class="idle-day" id="idleDay">---</div>
            <div class="idle-clock" id="idleClock">--:--</div>
            <div class="idle-weather">
                <span class="idle-weather-icon" id="idleWeatherIcon"></span>
                <span class="idle-weather-temp" id="idleWeatherTemp">--°F</span>
                <span class="idle-weather-condition" id="idleWeatherCondition"></span>
            </div>
            <div class="idle-prompt">Toss on a Vinyl!</div>
            <div class="idle-top-artists" id="idleTopArtists"></div>
        </div>
    </div>

    <!-- Now Playing View -->
    <div class="view active" id="playingView">
        <div class="idle-state" id="idleState">
            <h2>Waiting for music...</h2>
            <p>Play a record and we'll identify it</p>
        </div>

        <div class="now-playing hidden" id="nowPlaying">
            <div class="album-art" id="albumArt">
                <span class="placeholder">💿</span>
            </div>
            <div class="track-info">
                <div class="track-title-row">
                    <div class="track-title" id="trackTitle">Unknown Track</div>
                    <button class="star-btn" id="starBtn">☆</button>
                </div>
                <div class="track-artist" id="trackArtist">Unknown Artist</div>
                <div class="track-details">
                    <span>💿 <span id="trackAlbum">Unknown Album</span></span>
                    <span>📅 <span id="trackYear">----</span></span>
                    <span class="history-badge hidden" id="historyBadge">🔄 Played Before</span>
                    <span class="new-badge hidden" id="newBadge">✨ First Play</span>
                </div>
            </div>
        </div>
    </div>

    <!-- History View -->
    <div class="view" id="historyView">
        <div class="history-tabs">
            <button class="history-tab active" id="dashboardTab">Dashboard</button>
            <button class="history-tab" id="tracksTab">All Tracks</button>
            <button class="history-tab" id="genresTab">Genres</button>
        </div>

        <!-- Dashboard Panel -->
        <div class="history-panel active" id="dashboardPanel">
            <div class="stats-row">
                <div class="stat-box">
                    <div class="stat-value" id="totalPlays">0</div>
                    <div class="stat-label">Plays</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="uniqueTracks">0</div>
                    <div class="stat-label">Tracks</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="uniqueArtists">0</div>
                    <div class="stat-label">Artists</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="uniqueDays">0</div>
                    <div class="stat-label">Sessions</div>
                </div>
            </div>
            <div class="top-lists">
                <div class="top-card">
                    <h3>Top Tracks</h3>
                    <div class="top-list" id="topTracks"></div>
                </div>
                <div class="top-card">
                    <h3>Top Artists</h3>
                    <div class="top-list" id="topArtists"></div>
                </div>
            </div>
        </div>

        <!-- All Tracks Panel -->
        <div class="history-panel" id="tracksPanel">
            <div class="history-filters">
                <input type="text" class="search-input" id="searchInput" placeholder="Search tracks, artists...">
                <button class="filter-btn" id="starredFilter">★ Starred</button>
            </div>
            <div class="history-table-container">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th style="width: 30px;">★</th>
                            <th style="width: 30px;">#</th>
                            <th>Track</th>
                            <th style="width: 80px;">When</th>
                        </tr>
                    </thead>
                </table>
                <div class="history-table-body">
                    <table class="history-table">
                        <tbody id="historyTable"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Genres Panel -->
        <div class="history-panel" id="genresPanel">
            <div class="genre-chart-container">
                <h3>Listens by Genre</h3>
                <div id="genreChart" class="genre-chart"></div>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <div class="status-left">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-text" id="statusText">Connecting...</span>
        </div>
        <div class="audio-visualizer" id="audioVisualizer">
            <div class="audio-bar"></div>
            <div class="audio-bar"></div>
            <div class="audio-bar"></div>
            <div class="audio-bar"></div>
            <div class="audio-bar"></div>
            <div class="audio-bar"></div>
            <div class="audio-bar"></div>
            <div class="audio-bar"></div>
        </div>
    </div>

    <script>
        // Elements
        const idleView = document.getElementById('idleView');
        const playingView = document.getElementById('playingView');
        const historyView = document.getElementById('historyView');
        const idleBtn = document.getElementById('idleBtn');
        const playingBtn = document.getElementById('playingBtn');
        const historyBtn = document.getElementById('historyBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const idleState = document.getElementById('idleState');
        const nowPlaying = document.getElementById('nowPlaying');
        const albumArt = document.getElementById('albumArt');
        const backgroundBlur = document.getElementById('backgroundBlur');
        const trackTitle = document.getElementById('trackTitle');
        const trackArtist = document.getElementById('trackArtist');
        const trackAlbum = document.getElementById('trackAlbum');
        const trackYear = document.getElementById('trackYear');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const audioBars = document.querySelectorAll('.audio-bar');
        const starBtn = document.getElementById('starBtn');

        // Idle screen elements
        const idleDay = document.getElementById('idleDay');
        const idleClock = document.getElementById('idleClock');
        const idleWeatherIcon = document.getElementById('idleWeatherIcon');
        const idleWeatherTemp = document.getElementById('idleWeatherTemp');
        const idleWeatherCondition = document.getElementById('idleWeatherCondition');
        const idleParticles = document.getElementById('idleParticles');
        const idleTopArtists = document.getElementById('idleTopArtists');

        // History tabs
        const dashboardTab = document.getElementById('dashboardTab');
        const tracksTab = document.getElementById('tracksTab');
        const genresTab = document.getElementById('genresTab');
        const dashboardPanel = document.getElementById('dashboardPanel');
        const tracksPanel = document.getElementById('tracksPanel');
        const genresPanel = document.getElementById('genresPanel');

        // History/new badges
        const historyBadge = document.getElementById('historyBadge');
        const newBadge = document.getElementById('newBadge');

        let currentView = 'playing';
        let currentHistoryTab = 'dashboard';
        let lastTrackId = null;
        let hasTrack = false;
        let currentTrackStarred = false;
        let allListens = [];
        let showStarredOnly = false;
        let isIdle = false;
        let idleClockInterval = null;
        let weatherCache = null;
        let weatherFetchedAt = 0;

        // View switching
        function switchView(view) {
            currentView = view;
            idleView.classList.toggle('active', view === 'idle');
            playingView.classList.toggle('active', view === 'playing');
            historyView.classList.toggle('active', view === 'history');
            idleBtn.classList.toggle('active', view === 'idle');
            playingBtn.classList.toggle('active', view === 'playing');
            historyBtn.classList.toggle('active', view === 'history');

            if (view === 'history') {
                document.body.style.background = '#121212';
                loadDashboard();
                stopIdleScreen();
            } else if (view === 'idle') {
                document.body.style.background = '';
                startIdleScreen();
            } else {
                document.body.style.background = '';
                stopIdleScreen();
            }
        }

        // Idle screen functions
        function startIdleScreen() {
            if (idleClockInterval) return;
            updateIdleClock();
            idleClockInterval = setInterval(updateIdleClock, 1000);
            fetchWeather();
            fetchTopArtistsForIdle();
            createParticles();
            // Set a random prompt each time idle screen loads
            document.querySelector('.idle-prompt').textContent = getRandomPrompt();
        }

        function stopIdleScreen() {
            if (idleClockInterval) {
                clearInterval(idleClockInterval);
                idleClockInterval = null;
            }
        }

        function updateIdleClock() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            const displayHours = hours % 12 || 12;
            idleClock.textContent = `${displayHours}:${minutes} ${ampm}`;

            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            idleDay.textContent = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
        }

        async function fetchWeather() {
            const now = Date.now();
            // Use cache if less than 15 minutes old
            if (weatherCache && (now - weatherFetchedAt) < 900000) {
                displayWeather(weatherCache);
                return;
            }

            try {
                const res = await fetch('/api/weather');
                const data = await res.json();
                if (!data.error) {
                    weatherCache = data;
                    weatherFetchedAt = now;
                    displayWeather(data);
                }
            } catch (e) {
                console.error('Weather fetch error:', e);
            }
        }

        function displayWeather(data) {
            idleWeatherTemp.textContent = `${data.temp_f}°F`;
            idleWeatherCondition.textContent = data.condition;
            idleWeatherIcon.textContent = getWeatherEmoji(data.condition);
        }

        function getWeatherEmoji(condition) {
            const c = (condition || '').toLowerCase();
            if (c.includes('sunny') || c.includes('clear')) return '☀️';
            if (c.includes('cloud') || c.includes('overcast')) return '☁️';
            if (c.includes('rain') || c.includes('drizzle')) return '🌧️';
            if (c.includes('snow')) return '❄️';
            if (c.includes('thunder') || c.includes('storm')) return '⛈️';
            if (c.includes('fog') || c.includes('mist')) return '🌫️';
            if (c.includes('partly')) return '⛅';
            return '🌤️';
        }

        function createParticles() {
            idleParticles.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const particle = document.createElement('div');
                particle.className = 'idle-particle';
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.animationDelay = `${Math.random() * 12}s`;
                particle.style.animationDuration = `${8 + Math.random() * 8}s`;
                idleParticles.appendChild(particle);
            }
        }

        async function fetchTopArtistsForIdle() {
            try {
                const res = await fetch('/api/top-artists?limit=3');
                const artists = await res.json();
                if (artists && artists.length > 0) {
                    const rankLabels = ['#1', '#2', '#3'];
                    idleTopArtists.innerHTML = artists.map((a, i) => `
                        <div class="idle-artist">
                            <span class="idle-artist-rank">${rankLabels[i]}</span>
                            <span class="idle-artist-name">${a.artist}</span>
                        </div>
                    `).join('');
                } else {
                    idleTopArtists.innerHTML = '';
                }
            } catch (e) {
                idleTopArtists.innerHTML = '';
            }
        }

        // Idle screen prompts
        const idlePrompts = [
            "Toss on a Vinyl!",
            "Spin something good",
            "Drop the needle",
            "What's on the platter?",
            "Let the music play",
            "Time for some tunes",
            "Dust off a record",
            "Groove awaits",
            "Pick your poison",
            "Cue the wax",
            "Press play on analog",
            "The turntable is waiting",
            "Warm up the tubes",
            "Flip to side B",
            "Let it spin"
        ];

        function getRandomPrompt() {
            return idlePrompts[Math.floor(Math.random() * idlePrompts.length)];
        }

        function handleIdleState(idle) {
            if (idle && !isIdle && currentView === 'playing') {
                isIdle = true;
                switchView('idle');
            } else if (!idle && isIdle) {
                isIdle = false;
                switchView('playing');
            }
        }

        // History tab switching
        function switchHistoryTab(tab) {
            currentHistoryTab = tab;
            dashboardTab.classList.toggle('active', tab === 'dashboard');
            tracksTab.classList.toggle('active', tab === 'tracks');
            genresTab.classList.toggle('active', tab === 'genres');
            dashboardPanel.classList.toggle('active', tab === 'dashboard');
            tracksPanel.classList.toggle('active', tab === 'tracks');
            genresPanel.classList.toggle('active', tab === 'genres');

            if (tab === 'tracks') {
                loadHistory();
            } else if (tab === 'genres') {
                loadGenreChart();
            }
        }

        idleBtn.addEventListener('click', () => switchView('idle'));
        playingBtn.addEventListener('click', () => switchView('playing'));
        historyBtn.addEventListener('click', () => switchView('history'));
        dashboardTab.addEventListener('click', () => switchHistoryTab('dashboard'));
        tracksTab.addEventListener('click', () => switchHistoryTab('tracks'));
        genresTab.addEventListener('click', () => switchHistoryTab('genres'));

        // Fullscreen
        function updateFullscreenButton() {
            fullscreenBtn.textContent = document.fullscreenElement ? 'Exit FS' : 'Fullscreen';
        }

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen();
            }
        });

        document.addEventListener('fullscreenchange', updateFullscreenButton);

        // Audio level visualization
        function updateAudioLevel(level) {
            const normalized = Math.min(level, 1);
            audioBars.forEach((bar, i) => {
                const randomFactor = 0.7 + Math.random() * 0.3;
                const threshold = i / audioBars.length;
                const height = normalized > threshold
                    ? Math.min(20, (normalized - threshold) * 150 * randomFactor)
                    : 2;
                bar.style.height = `${height}px`;
            });
        }

        // Track display
        async function updateCurrentTrack(track) {
            if (!track || !track.track) {
                if (!hasTrack) {
                    idleState.classList.remove('hidden');
                    nowPlaying.classList.add('hidden');
                }
                return;
            }

            hasTrack = true;
            idleState.classList.add('hidden');
            nowPlaying.classList.remove('hidden');

            trackTitle.textContent = track.track;
            trackArtist.textContent = track.artist;
            trackAlbum.textContent = track.album || 'Unknown Album';
            trackYear.textContent = track.year || '----';

            currentTrackStarred = track.starred;
            updateStarButton();

            // Check if track is in history (played before)
            try {
                const res = await fetch(`/api/check-history?track=${encodeURIComponent(track.track)}&artist=${encodeURIComponent(track.artist)}`);
                const data = await res.json();
                if (data.in_history) {
                    historyBadge.classList.remove('hidden');
                    newBadge.classList.add('hidden');
                } else {
                    historyBadge.classList.add('hidden');
                    newBadge.classList.remove('hidden');
                }
            } catch (e) {
                historyBadge.classList.add('hidden');
                newBadge.classList.add('hidden');
            }

            if (track.cover_url) {
                albumArt.innerHTML = `<img src="${track.cover_url}" alt="Album Art" crossorigin="anonymous" id="albumImage">`;
                backgroundBlur.style.backgroundImage = `url(${track.cover_url})`;

                const img = document.getElementById('albumImage');
                img.onload = () => extractColors(img);
            } else {
                albumArt.innerHTML = '<span class="placeholder">💿</span>';
                backgroundBlur.style.backgroundImage = '';
                document.body.style.setProperty('--bg-color-1', '#1a1a2e');
                document.body.style.setProperty('--bg-color-2', '#16213e');
            }
        }

        function extractColors(img) {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 50;
                canvas.height = 50;
                ctx.drawImage(img, 0, 0, 50, 50);

                const imageData = ctx.getImageData(0, 0, 50, 50).data;
                let r = 0, g = 0, b = 0, count = 0;

                for (let i = 0; i < imageData.length; i += 16) {
                    r += imageData[i];
                    g += imageData[i + 1];
                    b += imageData[i + 2];
                    count++;
                }

                r = Math.floor(r / count);
                g = Math.floor(g / count);
                b = Math.floor(b / count);

                const darken = 0.3;
                document.body.style.setProperty('--bg-color-1', `rgb(${Math.floor(r*darken)},${Math.floor(g*darken)},${Math.floor(b*darken)})`);
                document.body.style.setProperty('--bg-color-2', `rgb(${Math.floor(r*darken*0.7)},${Math.floor(g*darken*0.7)},${Math.floor(b*darken*0.7)})`);
            } catch (e) {}
        }

        // Star functionality
        function updateStarButton() {
            starBtn.textContent = currentTrackStarred ? '★' : '☆';
            starBtn.classList.toggle('starred', currentTrackStarred);
        }

        async function toggleStar(listenId) {
            try {
                const response = await fetch(`/api/star/${listenId}`, { method: 'POST' });
                const data = await response.json();
                return data.starred;
            } catch (e) {
                return null;
            }
        }

        starBtn.addEventListener('click', async () => {
            if (!lastTrackId) return;
            const starred = await toggleStar(lastTrackId);
            if (starred !== null) {
                currentTrackStarred = starred;
                updateStarButton();
            }
        });

        // SSE connection
        let evtSource = null;

        function connectSSE() {
            if (evtSource) {
                evtSource.close();
            }

            evtSource = new EventSource('/api/events');

            evtSource.onmessage = (event) => {
                const data = JSON.parse(event.data);

                statusDot.className = 'status-dot ' + data.status;
                statusText.textContent = data.message || data.status;

                updateAudioLevel(data.audio_level || 0);

                // Handle idle state
                if (data.idle_config && data.idle_config.enabled) {
                    handleIdleState(data.idle);
                }

                if (data.new_track && data.new_track.id !== lastTrackId) {
                    lastTrackId = data.new_track.id;
                    updateCurrentTrack(data.new_track);
                } else if (data.current_track && !hasTrack) {
                    updateCurrentTrack(data.current_track);
                }
            };

            evtSource.onerror = () => {
                evtSource.close();
                evtSource = null;
                statusDot.className = 'status-dot';
                statusText.textContent = 'Reconnecting...';
                setTimeout(connectSSE, 5000);
            };
        }

        // Dashboard
        async function loadDashboard() {
            // Load stats
            try {
                const res = await fetch('/api/stats');
                const stats = await res.json();
                document.getElementById('totalPlays').textContent = stats.total_listens || 0;
                document.getElementById('uniqueTracks').textContent = stats.unique_tracks || 0;
                document.getElementById('uniqueArtists').textContent = stats.unique_artists || 0;
                document.getElementById('uniqueDays').textContent = stats.unique_days || 0;
            } catch (e) {}

            // Load top tracks
            try {
                const res = await fetch('/api/top-tracks?limit=10');
                const tracks = await res.json();
                const container = document.getElementById('topTracks');

                if (!tracks.length) {
                    container.innerHTML = '<div class="empty-msg">No tracks yet</div>';
                } else {
                    container.innerHTML = tracks.map((t, i) => `
                        <div class="top-item">
                            <span class="top-rank ${i < 3 ? 'gold' : ''}">${i + 1}</span>
                            ${t.cover_url ? `<img src="${t.cover_url}" class="top-cover">` : '<div class="top-cover"></div>'}
                            <div class="top-info">
                                <div class="top-name">${t.track}</div>
                                <div class="top-sub">${t.artist}</div>
                            </div>
                            <span class="top-count">${t.play_count}x</span>
                        </div>
                    `).join('');
                }
            } catch (e) {}

            // Load top artists
            try {
                const res = await fetch('/api/top-artists?limit=10');
                const artists = await res.json();
                const container = document.getElementById('topArtists');

                if (!artists.length) {
                    container.innerHTML = '<div class="empty-msg">No artists yet</div>';
                } else {
                    container.innerHTML = artists.map((a, i) => `
                        <div class="top-item">
                            <span class="top-rank ${i < 3 ? 'gold' : ''}">${i + 1}</span>
                            <div class="top-cover" style="display:flex;align-items:center;justify-content:center;font-size:0.7rem;">🎤</div>
                            <div class="top-info">
                                <div class="top-name">${a.artist}</div>
                                <div class="top-sub">${a.unique_tracks} tracks</div>
                            </div>
                            <span class="top-count">${a.play_count}x</span>
                        </div>
                    `).join('');
                }
            } catch (e) {}
        }

        // History (All Tracks)
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();

            // Check if same day (today)
            const isToday = date.toDateString() === now.toDateString();
            if (isToday) {
                return 'Today';
            }

            // Check if yesterday
            const yesterday = new Date(now);
            yesterday.setDate(yesterday.getDate() - 1);
            if (date.toDateString() === yesterday.toDateString()) {
                return 'Yesterday';
            }

            // Otherwise show date
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        // Genre chart
        async function loadGenreChart() {
            try {
                const res = await fetch('/api/genres');
                const genres = await res.json();
                const container = document.getElementById('genreChart');

                if (!genres.length) {
                    container.innerHTML = '<div class="empty-msg">No genre data yet</div>';
                    return;
                }

                const maxCount = Math.max(...genres.map(g => g.count));
                container.innerHTML = genres.map(g => {
                    const width = (g.count / maxCount) * 100;
                    return `
                        <div class="genre-bar-item">
                            <span class="genre-name">${g.genre}</span>
                            <div class="genre-bar-wrapper">
                                <div class="genre-bar" style="width: ${width}%"></div>
                            </div>
                            <span class="genre-count">${g.count}</span>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                console.error('Failed to load genres:', e);
            }
        }

        async function loadHistory() {
            const query = document.getElementById('searchInput').value;
            let url = '/api/history?limit=100';
            if (query) url += `&q=${encodeURIComponent(query)}`;
            if (showStarredOnly) url += `&starred=1`;

            try {
                const res = await fetch(url);
                allListens = await res.json();
                renderHistory();
            } catch (e) {}
        }

        function renderHistory() {
            const tbody = document.getElementById('historyTable');

            if (!allListens.length) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#555;padding:20px;">No listens found</td></tr>';
                return;
            }

            tbody.innerHTML = allListens.map(l => `
                <tr>
                    <td><span class="history-star ${l.starred ? 'starred' : ''}" data-id="${l.id}">${l.starred ? '★' : '☆'}</span></td>
                    <td class="track-num">${l.track_number || '-'}</td>
                    <td>
                        <div class="history-track-cell">
                            ${l.cover_url ? `<img src="${l.cover_url}" class="history-cover">` : '<div class="history-cover"></div>'}
                            <div class="history-track-info">
                                <div class="history-track-name">${l.track}</div>
                                <div class="history-track-artist">${l.artist}</div>
                            </div>
                        </div>
                    </td>
                    <td class="text-muted">${formatDate(l.listened_at)}</td>
                </tr>
            `).join('');

            // Star click handlers
            tbody.querySelectorAll('.history-star').forEach(el => {
                el.addEventListener('click', async () => {
                    const id = parseInt(el.dataset.id);
                    const starred = await toggleStar(id);
                    if (starred !== null) {
                        el.textContent = starred ? '★' : '☆';
                        el.classList.toggle('starred', starred);
                        const listen = allListens.find(l => l.id === id);
                        if (listen) listen.starred = starred ? 1 : 0;
                    }
                });
            });
        }

        // Search
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(loadHistory, 300);
        });

        document.getElementById('starredFilter').addEventListener('click', () => {
            showStarredOnly = !showStarredOnly;
            document.getElementById('starredFilter').classList.toggle('active', showStarredOnly);
            loadHistory();
        });

        // Load current track
        async function loadCurrentTrack() {
            try {
                const response = await fetch('/api/current');
                const track = await response.json();
                if (track) {
                    lastTrackId = track.id;
                    updateCurrentTrack(track);
                }
            } catch (e) {}
        }

        // Init
        loadCurrentTrack();
        connectSSE();
    </script>
</body>
</html>
