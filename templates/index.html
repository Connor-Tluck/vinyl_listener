<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinyl ID - Now Playing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
            transition: background 1s ease;
        }

        /* Dynamic gradient background based on album art */
        .background-gradient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background: linear-gradient(135deg, var(--bg-color-1, #1a1a2e) 0%, var(--bg-color-2, #16213e) 100%);
            transition: background 1.5s ease;
        }

        .background-blur {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-size: cover;
            background-position: center;
            filter: blur(100px) saturate(1.5);
            opacity: 0.4;
            z-index: -1;
            transition: background-image 1s ease;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), transparent);
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }


        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #fff;
        }

        /* Main content */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 100px 20px 40px;
        }

        /* Album art section */
        .album-container {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }

        .album-art {
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, #333 0%, #222 100%);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .album-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .album-art .placeholder {
            font-size: 6rem;
            opacity: 0.3;
        }

        /* Track info */
        .track-info {
            text-align: center;
            max-width: 500px;
        }

        .track-title-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 8px;
        }

        .track-title {
            font-size: 2rem;
            font-weight: 600;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .star-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            font-size: 1.3rem;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 50%;
            transition: transform 0.2s, background 0.2s, border-color 0.2s, color 0.2s;
            line-height: 1;
            color: rgba(255,255,255,0.5);
        }

        .star-btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.5);
            transform: scale(1.1);
        }

        .star-btn:active {
            transform: scale(0.95);
        }

        .star-btn.starred {
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.2);
            border-color: #fbbf24;
            animation: starPop 0.3s ease;
        }

        @keyframes starPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .track-artist {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 20px;
        }

        .track-details {
            display: flex;
            justify-content: center;
            gap: 25px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
        }

        .track-details span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Status indicator */
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 30px;
            background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #666;
        }

        .status-dot.listening {
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        .status-dot.analyzing {
            background: #fbbf24;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 currentColor; }
            50% { opacity: 0.7; box-shadow: 0 0 10px 3px currentColor; }
        }

        .status-text {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
        }

        /* Audio visualizer */
        .audio-visualizer {
            display: flex;
            gap: 3px;
            height: 30px;
            align-items: flex-end;
        }

        .audio-bar {
            width: 4px;
            background: linear-gradient(to top, #4ade80, #22d3ee);
            border-radius: 2px;
            transition: height 0.1s ease;
        }

        /* Idle state */
        .idle-state {
            text-align: center;
        }

        .idle-state h2 {
            font-size: 1.5rem;
            font-weight: 400;
            color: rgba(255,255,255,0.5);
            margin-bottom: 10px;
        }

        .idle-state p {
            color: rgba(255,255,255,0.3);
        }

        .hidden {
            display: none !important;
        }

        /* Pi/Touch mode styles */
        {% if display.touch_mode %}
        .star-btn {
            font-size: 3rem;
            padding: 16px 20px;
            min-width: 80px;
            min-height: 80px;
        }

        .nav-links a {
            font-size: 1.1rem;
            padding: 10px 15px;
        }
        {% endif %}

        {% if display.fullscreen %}
        body {
            cursor: none;
        }

        nav {
            padding: 15px 20px;
        }
        {% endif %}
    </style>
</head>
<body>
    <div class="background-gradient"></div>
    <div class="background-blur" id="backgroundBlur"></div>

    <nav>
        <div class="logo">
            <span>VINYL ID</span>
        </div>
        <div class="nav-links">
            <a href="/" class="active">Now Playing</a>
            <a href="/history">History</a>
        </div>
    </nav>

    <div class="container">
        <!-- Idle state -->
        <div class="idle-state" id="idleState">
            <h2>Waiting for music...</h2>
            <p>Play a record and we'll identify it</p>
        </div>

        <!-- Now playing state -->
        <div class="now-playing hidden" id="nowPlaying">
            <div class="album-container">
                <div class="album-art" id="albumArt">
                    <span class="placeholder">💿</span>
                </div>
            </div>

            <div class="track-info">
                <div class="track-title-row">
                    <div class="track-title" id="trackTitle">Unknown Track</div>
                    <button class="star-btn" id="starBtn" title="Add to favorites">☆</button>
                </div>
                <div class="track-artist" id="trackArtist">Unknown Artist</div>
                <div class="track-details">
                    <span>💿 <span id="trackAlbum">Unknown Album</span></span>
                    <span>📅 <span id="trackYear">----</span></span>
                </div>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <div class="status-left">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-text" id="statusText">Connecting...</span>
        </div>
        <div class="audio-visualizer" id="audioVisualizer">
            <div class="audio-bar"></div>
            <div class="audio-bar"></div>
            <div class="audio-bar"></div>
            <div class="audio-bar"></div>
            <div class="audio-bar"></div>
            <div class="audio-bar"></div>
            <div class="audio-bar"></div>
            <div class="audio-bar"></div>
            <div class="audio-bar"></div>
            <div class="audio-bar"></div>
            <div class="audio-bar"></div>
            <div class="audio-bar"></div>
        </div>
    </div>

    <script>
        const idleState = document.getElementById('idleState');
        const nowPlaying = document.getElementById('nowPlaying');
        const albumArt = document.getElementById('albumArt');
        const backgroundBlur = document.getElementById('backgroundBlur');
        const trackTitle = document.getElementById('trackTitle');
        const trackArtist = document.getElementById('trackArtist');
        const trackAlbum = document.getElementById('trackAlbum');
        const trackYear = document.getElementById('trackYear');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const audioBars = document.querySelectorAll('.audio-bar');
        const starBtn = document.getElementById('starBtn');

        let lastTrackId = null;
        let hasTrack = false;
        let currentTrackStarred = false;

        function updateAudioLevel(level) {
            const normalized = Math.min(level, 1);
            audioBars.forEach((bar, i) => {
                const randomFactor = 0.7 + Math.random() * 0.3;
                const threshold = i / audioBars.length;
                const height = normalized > threshold
                    ? Math.min(30, (normalized - threshold) * 200 * randomFactor)
                    : 2;
                bar.style.height = `${height}px`;
            });
        }

        function updateCurrentTrack(track) {
            if (!track || !track.track) {
                if (!hasTrack) {
                    idleState.classList.remove('hidden');
                    nowPlaying.classList.add('hidden');
                }
                return;
            }

            hasTrack = true;
            idleState.classList.add('hidden');
            nowPlaying.classList.remove('hidden');

            trackTitle.textContent = track.track;
            trackArtist.textContent = track.artist;
            trackAlbum.textContent = track.album || 'Unknown Album';
            trackYear.textContent = track.year || '----';

            // Update star button
            currentTrackStarred = track.starred;
            updateStarButton();

            // Update album art
            if (track.cover_url) {
                albumArt.innerHTML = `<img src="${track.cover_url}" alt="Album Art" crossorigin="anonymous" id="albumImage">`;
                backgroundBlur.style.backgroundImage = `url(${track.cover_url})`;

                // Extract colors from album art for gradient
                const img = document.getElementById('albumImage');
                img.onload = () => extractColors(img);
            } else {
                albumArt.innerHTML = '<span class="placeholder">💿</span>';
                backgroundBlur.style.backgroundImage = '';
                document.body.style.setProperty('--bg-color-1', '#1a1a2e');
                document.body.style.setProperty('--bg-color-2', '#16213e');
            }
        }

        function extractColors(img) {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 50;
                canvas.height = 50;
                ctx.drawImage(img, 0, 0, 50, 50);

                const imageData = ctx.getImageData(0, 0, 50, 50).data;
                let r = 0, g = 0, b = 0, count = 0;

                for (let i = 0; i < imageData.length; i += 16) {
                    r += imageData[i];
                    g += imageData[i + 1];
                    b += imageData[i + 2];
                    count++;
                }

                r = Math.floor(r / count);
                g = Math.floor(g / count);
                b = Math.floor(b / count);

                // Darken for background
                const darken = 0.3;
                const r1 = Math.floor(r * darken);
                const g1 = Math.floor(g * darken);
                const b1 = Math.floor(b * darken);
                const r2 = Math.floor(r * darken * 0.7);
                const g2 = Math.floor(g * darken * 0.7);
                const b2 = Math.floor(b * darken * 0.7);

                document.body.style.setProperty('--bg-color-1', `rgb(${r1},${g1},${b1})`);
                document.body.style.setProperty('--bg-color-2', `rgb(${r2},${g2},${b2})`);
            } catch (e) {
                console.log('Could not extract colors:', e);
            }
        }

        let evtSource = null;

        function connectSSE() {
            // Close existing connection if any
            if (evtSource) {
                evtSource.close();
                evtSource = null;
            }

            evtSource = new EventSource('/api/events');

            evtSource.onmessage = (event) => {
                const data = JSON.parse(event.data);

                // Update status
                statusDot.className = 'status-dot ' + data.status;
                statusText.textContent = data.message || data.status;


                // Audio level
                updateAudioLevel(data.audio_level || 0);

                // New track
                if (data.new_track && data.new_track.id !== lastTrackId) {
                    lastTrackId = data.new_track.id;
                    updateCurrentTrack(data.new_track);
                } else if (data.current_track && !hasTrack) {
                    updateCurrentTrack(data.current_track);
                }
            };

            evtSource.onerror = () => {
                evtSource.close();
                evtSource = null;
                statusDot.className = 'status-dot';
                statusText.textContent = 'Disconnected - Reconnecting...';
                setTimeout(connectSSE, 5000);
            };
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (evtSource) evtSource.close();
        });

        // Load last track on page load
        async function loadCurrentTrack() {
            try {
                const response = await fetch('/api/current');
                const track = await response.json();
                if (track) {
                    lastTrackId = track.id;
                    updateCurrentTrack(track);
                }
            } catch (e) {
                console.error('Failed to load current track:', e);
            }
        }

        function updateStarButton() {
            starBtn.textContent = currentTrackStarred ? '★' : '☆';
            starBtn.classList.toggle('starred', currentTrackStarred);
            starBtn.title = currentTrackStarred ? 'Remove from favorites' : 'Add to favorites';
        }

        async function toggleStar() {
            if (!lastTrackId) return;

            try {
                const response = await fetch(`/api/star/${lastTrackId}`, { method: 'POST' });
                const data = await response.json();
                currentTrackStarred = data.starred;
                updateStarButton();
            } catch (e) {
                console.error('Failed to toggle star:', e);
            }
        }

        starBtn.addEventListener('click', toggleStar);

        loadCurrentTrack();
        connectSSE();
    </script>
</body>
</html>
